<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .title { font: 700 42px Arial, sans-serif; fill: #111827; }
      .h { font: 700 26px Arial, sans-serif; fill: #111827; }
      .t { font: 20px Arial, sans-serif; fill: #111827; }
      .small { font: 17px Arial, sans-serif; fill: #111827; }
      .pin { font: 700 18px Arial, sans-serif; fill: #111827; }
      .note { font: 18px Arial, sans-serif; fill: #1f2937; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 3; rx: 14; }
      .board { fill: #0f172a; stroke: #334155; stroke-width: 4; rx: 24; }
      .pinbox { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 6; }
      .sensor { fill: #f8fafc; stroke: #111827; stroke-width: 4; }
      .led { fill: #f8fafc; stroke: #111827; stroke-width: 4; rx: 14; }
      .res { fill: #fef3c7; stroke: #92400e; stroke-width: 3; rx: 8; }
      .cap { fill: #111827; stroke: #111827; stroke-width: 2; rx: 5; }
      .wire { fill: none; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 12 10; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#ffffff"/>
  <text x="800" y="58" text-anchor="middle" class="title">СХЕМА ПІДКЛЮЧЕННЯ ДЛЯ ПАЙКИ</text>

  <!-- ESP32 board -->
  <rect x="650" y="150" width="300" height="670" class="board"/>
  <text x="800" y="205" text-anchor="middle" class="h" fill="#e5e7eb">ESP32-C3</text>
  <text x="800" y="236" text-anchor="middle" class="t" fill="#cbd5e1">SuperMini</text>
  <rect x="735" y="330" width="130" height="150" fill="#1f2937" stroke="#94a3b8" stroke-width="3" rx="12"/>
  <text x="800" y="397" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#e5e7eb">ESP32</text>
  <text x="800" y="431" text-anchor="middle" font-family="Arial" font-size="20" fill="#cbd5e1">C3</text>

  <!-- Board pins left -->
  <rect x="610" y="190" width="90" height="34" class="pinbox"/><text x="655" y="214" text-anchor="middle" class="pin">5V/VBUS</text>
  <rect x="610" y="270" width="90" height="34" class="pinbox"/><text x="655" y="294" text-anchor="middle" class="pin">GND</text>
  <rect x="610" y="360" width="90" height="34" class="pinbox"/><text x="655" y="384" text-anchor="middle" class="pin">3V3</text>
  <rect x="610" y="455" width="90" height="34" class="pinbox"/><text x="655" y="479" text-anchor="middle" class="pin">GPIO4</text>
  <rect x="610" y="550" width="90" height="34" class="pinbox"/><text x="655" y="574" text-anchor="middle" class="pin">GPIO1</text>
  <rect x="610" y="665" width="90" height="34" class="pinbox"/><text x="655" y="689" text-anchor="middle" class="pin">GPIO0</text>
  <rect x="610" y="760" width="90" height="34" class="pinbox"/><text x="655" y="784" text-anchor="middle" class="pin">GND</text>

  <!-- Sensor -->
  <circle cx="160" cy="330" r="105" class="sensor"/>
  <circle cx="160" cy="330" r="82" fill="none" stroke="#64748b" stroke-width="3"/>
  <text x="160" y="315" text-anchor="middle" class="h">XKC-Y25</text>
  <text x="160" y="350" text-anchor="middle" class="t">NPN</text>
  <text x="160" y="485" text-anchor="middle" class="h">Датчик рівня</text>

  <!-- Sensor wires -->
  <path d="M260 275 C360 190, 455 207, 610 207" class="wire" stroke="#8B4513"/>
  <text x="300" y="222" class="pin" fill="#8B4513">Brown VCC -> 5V/VBUS</text>

  <path d="M260 310 C360 280, 455 287, 610 287" class="wire" stroke="#2563eb"/>
  <text x="300" y="302" class="pin" fill="#2563eb">Blue GND -> GND</text>

  <path d="M260 350 C380 430, 465 472, 610 472" class="wire" stroke="#eab308"/>
  <text x="300" y="410" class="pin" fill="#ca8a04">Yellow OUT -> GPIO4</text>

  <path d="M260 390 C345 525, 455 638, 610 682" class="wire dash" stroke="#111827"/>
  <text x="300" y="542" class="pin">Black MODE: не підключати</text>
  <text x="300" y="570" class="small">або з'єднати з Blue GND для інверсії</text>

  <!-- Pull-up resistor -->
  <path d="M610 377 L510 377" class="wire" stroke="#ef4444"/>
  <rect x="420" y="352" width="90" height="50" class="res"/>
  <text x="465" y="384" text-anchor="middle" class="pin">10kΩ</text>
  <path d="M420 377 L420 472 L610 472" class="wire" stroke="#eab308"/>
  <text x="380" y="340" text-anchor="middle" class="t" fill="#15803d">підтяжка до 3V3</text>

  <!-- SK6812 -->
  <rect x="1240" y="230" width="220" height="210" class="led"/>
  <text x="1350" y="185" text-anchor="middle" class="h">SK6812 RGBW</text>
  <text x="1350" y="215" text-anchor="middle" class="t">світлодіод</text>
  <circle cx="1350" cy="335" r="55" fill="#e5e7eb" stroke="#94a3b8" stroke-width="3"/>
  <rect x="1328" y="313" width="44" height="44" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="1468" y="278" class="pin">5V</text>
  <text x="1468" y="335" class="pin">DIN</text>
  <text x="1468" y="392" class="pin">GND</text>

  <!-- LED wires -->
  <path d="M700 207 C1040 207, 1150 278, 1240 278" class="wire" stroke="#ef4444"/>
  <path d="M700 784 C1000 784, 1120 392, 1240 392" class="wire" stroke="#111827"/>
  <path d="M700 567 L990 567 L990 335 L1080 335" class="wire" stroke="#16a34a"/>
  <rect x="1080" y="310" width="95" height="50" class="res"/>
  <text x="1128" y="342" text-anchor="middle" class="pin">330Ω</text>
  <path d="M1175 335 L1240 335" class="wire" stroke="#16a34a"/>
  <text x="1050" y="294" class="t" fill="#15803d">data resistor</text>

  <!-- Capacitor -->
  <rect x="1148" y="455" width="52" height="100" class="cap"/>
  <line x1="1174" y1="440" x2="1174" y2="455" stroke="#111827" stroke-width="5"/>
  <line x1="1174" y1="555" x2="1174" y2="570" stroke="#111827" stroke-width="5"/>
  <path d="M1174 440 L1174 278" class="thin" stroke="#ef4444"/>
  <path d="M1174 570 L1174 392" class="thin" stroke="#111827"/>
  <text x="1215" y="495" class="t" fill="#1d4ed8">470-1000 uF</text>
  <text x="1215" y="523" class="small" fill="#1d4ed8">опціонально</text>

  <!-- Buzzer -->
  <circle cx="1260" cy="735" r="85" fill="#111827" stroke="#334155" stroke-width="4"/>
  <circle cx="1260" cy="735" r="22" fill="#facc15" stroke="#f59e0b" stroke-width="3"/>
  <text x="1260" y="630" text-anchor="middle" class="h">Пасивний бузер</text>
  <text x="1160" y="705" class="pin" fill="#dc2626">+</text>
  <text x="1160" y="780" class="pin">-</text>
  <path d="M700 682 C865 682, 1000 705, 1175 705" class="wire" stroke="#9333ea"/>
  <path d="M700 784 C900 815, 1030 780, 1175 780" class="wire" stroke="#111827"/>
  <text x="910" y="652" class="t" fill="#7e22ce">GPIO0 -> buzzer +</text>
  <text x="905" y="824" class="t">GND -> buzzer -</text>

  <!-- Common ground note -->
  <rect x="80" y="780" width="500" height="150" fill="#f8fafc" stroke="#2563eb" stroke-width="3" rx="16"/>
  <text x="110" y="820" class="h" fill="#1d4ed8">Важливо</text>
  <text x="110" y="858" class="note">GND датчика, SK6812, бузера і ESP32 мають бути з'єднані.</text>
  <text x="110" y="890" class="note">3V3 використовується тільки для підтяжки 10kΩ.</text>
  <text x="110" y="922" class="note">Black MODE не підключати до 5V або 3V3.</text>
</svg>
